name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
      EC2_HOST: ${{ secrets.EC2_HOST }}
      EC2_USER: ${{ secrets.EC2_USER }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Validate Deploy Configuration
        id: deploy_config
        shell: bash
        run: |
          missing=()

          [[ -n "${EC2_SSH_KEY}" ]] || missing+=("EC2_SSH_KEY")
          [[ -n "${EC2_HOST}" ]] || missing+=("EC2_HOST")
          [[ -n "${EC2_USER}" ]] || missing+=("EC2_USER")

          if (( ${#missing[@]} > 0 )); then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::warning title=Deploy skipped::Missing repository secrets: ${missing[*]}"
            exit 0
          fi

          echo "configured=true" >> "$GITHUB_OUTPUT"

      - name: Set up SSH
        if: steps.deploy_config.outputs.configured == 'true'
        uses: webfactory/ssh-agent@v0.7.0
        with:
          ssh-private-key: ${{ env.EC2_SSH_KEY }}

      - name: Add Known Hosts
        if: steps.deploy_config.outputs.configured == 'true'
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "${EC2_HOST}" >> ~/.ssh/known_hosts

      - name: Deploy to EC2
        if: steps.deploy_config.outputs.configured == 'true'
        run: |
          ssh "${EC2_USER}@${EC2_HOST}" 'bash ~/deploy.sh'
